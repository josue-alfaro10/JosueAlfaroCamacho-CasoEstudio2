<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/base :: head('Roles')}"></head>
    <body>
        <nav th:replace="~{general/base :: navbar}"></nav>

        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>🔑 Gestión de Roles</h3>
                <a th:href="@{/rol/nuevo}" class="btn btn-dark">+ Nuevo Rol</a>
            </div>

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

            <table class="table table-hover table-bordered">
                <thead class="table-dark">
                    <tr><th>#</th><th>Nombre</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.nombre}"></td>
                        <td>
                            <a th:href="@{/rol/editar/{id}(id=${r.id})}" class="btn btn-sm btn-warning">Editar</a>
                            <a th:href="@{/rol/eliminar/{id}(id=${r.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Eliminar este rol?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer th:replace="~{general/base :: footer}"></footer>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    </body>
</html>
